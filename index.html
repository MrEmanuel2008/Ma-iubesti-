<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mă iubești?</title>
    
    <!-- Fonturile de pe Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- TOATĂ STILIZAREA (CSS) ESTE AICI -->
    <style>
      :root {
        --primary-color: #ff4d6d;
        --secondary-color: #ff758f;
        --bg-color: #ffe5ec;
        --text-color: #590d22;
        --white: #ffffff;
      }

      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden; /* Blocăm complet scroll-ul (derularea) pe pagină */
      }

      *, *::before, *::after {
        box-sizing: border-box;
      }

      .container {
        text-align: center;
        position: relative;
        z-index: 10;
        width: 100%;
      }

      .card {
        background: rgba(255, 255, 255, 0.9);
        padding: 2rem;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(10px);
        max-width: 750px; /* Am lărgit puțin cardul ca să încapă pozele în linie */
        width: 90vw;
        margin: 0 auto;
        transition: transform 0.3s ease;
      }

      .title {
        font-family: 'Indie Flower', cursive;
        font-size: 3rem;
        color: var(--text-color);
        margin-top: 0;
        margin-bottom: 1rem;
      }

      .cute-gif {
        width: 130px; /* Dimensiune ușor redusă pentru a garanta spațiul pe ecran */
        height: auto;
        margin-bottom: 1.5rem;
        border-radius: 10px;
      }

      .buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 12px 32px;
        font-size: 1.2rem;
        font-weight: 600;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .btn-yes {
        background-color: #2ecc71;
        color: white;
        box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
      }

      .btn-yes:hover {
        background-color: #27ae60;
        transform: scale(1.05);
      }

      .btn-no {
        background-color: var(--primary-color);
        color: white;
        box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
      }

      .btn-no:hover {
        background-color: #c9184a;
      }

      .hidden {
        display: none !important;
      }

      /* Ecran Succes */
      .success-message {
        font-family: 'Indie Flower', cursive;
        font-size: 3.2rem;
        color: #ff0054;
        margin-top: 0;
        margin-bottom: 0.5rem;
        animation: popIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }

      .sub-text {
        font-size: 1.1rem;
        color: var(--text-color);
        opacity: 0.8;
        margin-bottom: 1rem;
      }

      /* Stilul Galeriei Foto Orizontale (Perfectă pentru Laptop, fără Scroll) */
      .photo-gallery {
        display: grid;
        grid-template-columns: repeat(5, 1fr); /* Toate cele 5 poze stau aliniate frumos într-un singur rând */
        gap: 10px;
        margin-top: 1rem;
      }

      .polaroid {
        background: white;
        padding: 6px 6px 16px 6px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        border-radius: 3px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .polaroid img {
        width: 100%;
        height: 110px; /* Înălțime fixă optimizată pentru ecranul de laptop */
        object-fit: cover;
        border-radius: 2px;
      }

      /* Efect de colaj discret */
      .polaroid:nth-child(1) { transform: rotate(-3deg); }
      .polaroid:nth-child(2) { transform: rotate(2deg); }
      .polaroid:nth-child(3) { transform: rotate(-1deg); }
      .polaroid:nth-child(4) { transform: rotate(3deg); }
      .polaroid:nth-child(5) { transform: rotate(-2deg); }

      .polaroid:hover {
        transform: scale(1.15) rotate(0deg);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        z-index: 5;
      }

      /* Animații */
      @keyframes popIn {
        0% { transform: scale(0); opacity: 0; }
        80% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); }
      }

      /* Inimioare zburătoare */
      .heart {
        position: absolute;
        color: #ff0054;
        font-size: 20px;
        opacity: 0;
        animation: float 4s linear infinite;
        z-index: 1;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh) scale(0);
          opacity: 0;
        }
        20% {
          opacity: 1;
          transform: translateY(80vh) scale(1);
        }
        100% {
          transform: translateY(-10vh) scale(0.5) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      
      <!-- Ecran Întrebare -->
      <div id="question-screen" class="card">
        <h1 class="title">Mă iubești?</h1>
        <div class="gif-container">
          <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMmo3c3l5ODh3ZGN6NHhhaDE2Mjg1djh2YzF0M2xpMWo1Y3k2Z2IzYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Ursuleț drăguț" class="cute-gif" id="initial-gif">
        </div>
        <div class="buttons">
          <button id="yes-btn" class="btn btn-yes">Da</button>
          <button id="no-btn" class="btn btn-no">Nu</button>
        </div>
      </div>

      <!-- Ecran Succes -->
      <div id="success-screen" class="card hidden">
        <h1 class="success-message">Știam eu! ❤️</h1>
        <div class="gif-container">
          <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXN6NGkzbW9wNmkyczU5dWh6eHR6M2c0bm50ZXV3aGdyY3J0Z3g0ZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/T86i6yDyOYz7J6dPhf/giphy.gif" alt="Ursuleț fericit" class="cute-gif">
        </div>
        <p class="sub-text">Ai făcut alegerea corectă!</p>
        
        <!-- Galeria foto orizontală cu pozele tale de pe WhatsApp -->
        <div class="photo-gallery">
          <div class="polaroid">
            <img src="WhatsApp Image 2026-06-22 at 21.27.36 (4).jpeg" alt="Amintire 1">
          </div>
          <div class="polaroid">
            <img src="WhatsApp Image 2026-06-22 at 21.27.36 (3).jpeg" alt="Amintire 2">
          </div>
          <div class="polaroid">
            <img src="WhatsApp Image 2026-06-22 at 21.27.36 (2).jpeg" alt="Amintire 3">
          </div>
          <div class="polaroid">
            <img src="WhatsApp Image 2026-06-22 at 21.27.36 (1).jpeg" alt="Amintire 4">
          </div>
          <div class="polaroid">
            <img src="WhatsApp Image 2026-06-22 at 21.27.36.jpeg" alt="Amintire 5">
          </div>
        </div>
      </div>

    </div>

    <!-- Container pentru ploaia de inimioare -->
    <div id="hearts-container"></div>

    <!-- LOGICA JAVASCRIPT -->
    <script>
      const yesBtn = document.getElementById('yes-btn');
      const noBtn = document.getElementById('no-btn');
      const questionScreen = document.getElementById('question-screen');
      const successScreen = document.getElementById('success-screen');
      const heartsContainer = document.getElementById('hearts-container');

      const noMessages = [
        "Nu", "Ești sigură?", "Sigur, sigur?", "Mai gândește-te!", 
        "Ultima șansă!", "Chiar nu?", "O să regreți!", "Mai analizează o dată!", 
        "Ești absolut convinsă?", "Ar putea fi o greșeală!", "Ai puțină milă!", 
        "Nu fii așa rece!", "Te-ai răzgândit?", "Nu vrei să reconsideri?", 
        "Ăsta e răspunsul final?", "Îmi frângi inima ;(", "Te roooog? :((", 
        "Bine, hai că te rog frumos...", "Te rog eu mult de tot, cu o cireșică deasupra?", 
        "O să încep să plâng...", "Nu-mi face asta :(", "O să mor singur(ă)...", 
        "Bine, o luăm de la capăt!"
      ];

      let messageIndex = 0;

      noBtn.addEventListener('click', handleNoClick);
      yesBtn.addEventListener('click', handleYesClick);

      function handleNoClick() {
        messageIndex = (messageIndex + 1) % noMessages.length;
        noBtn.innerText = noMessages[messageIndex];

        const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
        const newSize = currentSize * 1.15;
        yesBtn.style.fontSize = `${newSize}px`;
        
        const currentPadding = parseFloat(window.getComputedStyle(yesBtn).paddingTop);
        yesBtn.style.padding = `${currentPadding * 1.3}px ${currentPadding * 1.8}px`;

        const noSize = parseFloat(window.getComputedStyle(noBtn).fontSize);
        if (noSize > 6) {
          noBtn.style.fontSize = `${noSize * 0.95}px`;
        }
      }

      function handleYesClick() {
        questionScreen.classList.add('hidden');
        successScreen.classList.remove('hidden');
        createHearts();
      }

      function createHearts() {
        const heartCount = 40;
        for (let i = 0; i < heartCount; i++) {
          setTimeout(() => {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            heartsContainer.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
          }, i * 100);
        }
        
        setInterval(() => {
          const heart = document.createElement('div');
          heart.classList.add('heart');
          heart.innerHTML = '❤️';
          heart.style.left = Math.random() * 100 + 'vw';
          heart.style.animationDuration = Math.random() * 2 + 3 + 's';
          heart.style.fontSize = Math.random() * 15 + 15 + 'px';
          heartsContainer.appendChild(heart);
          setTimeout(() => { heart.remove(); }, 5000);
        }, 350);
      }
    </script>
  </body>
</html>
